<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DEZ-ENVOLVE - Portal</title>
    <link rel="stylesheet" href="style.css?v=11">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ffffff">
    <script src="pwa.js" defer></script>
</head>
<body>
    <div id="install-banner" class="install-banner hidden">
        <div class="install-banner-content">
            <img src="icons/icon-192.png" alt="Ícone" class="install-banner-icon">
            <div class="install-banner-text">
                <strong>App Dez-envolve</strong>
                Instale para receber atualizações rápidas.
            </div>
        </div>
        <div class="install-banner-actions">
            <button id="btn-install" class="btn-install">Instalar</button>
            <button id="btn-close-install" class="btn-close-banner">&times;</button>
        </div>
    </div>

    <nav class="navbar">
        <div class="brand-container">
            <img src="icons/icon-192.png" alt="Logo" class="nav-icon" onerror="this.style.display='none'">
            <span class="brand">DEZ-ENVOLVE</span>
        </div>
        <div id="user-nav">
            <button id="btn-login" class="btn-primary" style="padding: 6px 12px; font-size: 0.85rem;">Login</button>
            <div id="user-section-nav" class="hidden" style="display: flex; gap: 15px; align-items: center;">
                <a href="admin.html" style="font-size: 0.85rem; color: #dc2626; font-weight: bold; text-transform: uppercase;">Admin</a>
                <button id="btn-logout" class="btn-secondary" style="padding: 5px 10px; font-size: 0.8rem;">Sair</button>
            </div>
        </div>
    </nav>

    <div class="main-wrapper">
        
        <div class="portal-header" id="login-section">
            <h2>O Portal da Família</h2>
            <p style="color: #4b5563; font-weight: 500;">A escola ensina o "que" pensar. Nós ensinamos o "como" fazer.</p>
            <p style="font-size: 0.85rem; color: #6b7280; margin-top: 10px;">Faça login para acessar as editorias e conversar com a nossa IA Mentora.</p>
        </div>

        <div id="user-section" class="hidden">
            <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 20px;">
                <h2 style="font-size: 1.8rem;">Últimas Atualizações</h2>
                <span id="user-name" style="font-weight: 700; color: #2563eb; font-size: 0.9rem; text-transform: uppercase;"></span>
            </div>
            
            <div id="category-filters" class="scroll-menu">
                <button class="filter-btn active" data-categoria="todas">Capa</button>
                <button class="filter-btn" data-categoria="c1">Organização</button>
                <button class="filter-btn" data-categoria="c2">Tempo</button>
                <button class="filter-btn" data-categoria="c3">Estudo</button>
                <button class="filter-btn" data-categoria="c4">Digital/IA</button>
                <button class="filter-btn" data-categoria="c5">Finanças</button>
                <button class="filter-btn" data-categoria="c6">Decisão</button>
                <button class="filter-btn" data-categoria="c7">Leitura</button>
                <button class="filter-btn" data-categoria="c8">Disciplina</button>
                <button class="filter-btn" data-categoria="c9">Autoconhecimento</button>
                <button class="filter-btn" data-categoria="c10">Comunicação</button>
                <button class="filter-btn" data-categoria="e1">Profissão</button>
            </div>

            <div id="feed-posts" class="news-grid">
                <p style="color: #6b7280;">Buscando manchetes...</p>
            </div>
        </div>

    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
