<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DEZ-ENVOLVE (revista)</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">
    <script src="pwa.js" defer></script>
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="brand-container">
            <img src="icons/icon-192.png" alt="Logo" class="nav-icon">
            <span class="brand">DEZ-ENVOLVE</span>
        </a>
        <div class="nav-links" id="user-section" class="hidden">
            <a href="perfil.html">Meu Perfil</a>
            <a href="admin.html">Admin</a>
            <button id="btn-logout" class="btn-danger" style="padding: 5px 10px; font-size: 12px;">Sair</button>
        </div>
    </nav>

    <div class="main-wrapper">
        <div class="container text-center" id="login-section">
            <h1>Conteúdo & Inteligência</h1>
            <p style="color: var(--text-light); margin-bottom: 20px; font-size: 0.95rem;">Faça login para desbloquear a IA interativa nos artigos e salvar seu progresso.</p>
            <button id="btn-login" class="btn-primary" style="width: 100%; max-width: 280px;">Continuar com Google</button>
        </div>

        <div class="feed-header">
            <h2>Últimas Publicações</h2>
        </div>
        
        <div id="feed-posts">
            <div class="container text-center">
                <p style="color: var(--text-light); font-size: 0.9rem;">Carregando conteúdos...</p>
            </div>
        </div>
    </div>
    <script type="module" src="app.js"></script>
</body>
</html>
