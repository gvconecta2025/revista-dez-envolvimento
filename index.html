<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Revista Dez-envolvimento</title>
    <link rel="stylesheet" href="style.css">
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#007BFF">
    <script src="pwa.js" defer></script>
</head>
<body>
    <header>
        <h1>Revista Dez-envolvimento</h1>
        <p>Conteúdo de valor e desenvolvimento contínuo.</p>

        <p>Faça login para interagir com o conteúdo e a IA.</p>

        <button id="btn-logout" style="background-color: #dc3545;">Sair</button>
        <br><br>
        <a href="perfil.html" style="display: block; margin-bottom: 10px; font-weight: bold; color: #28a745;">👤 Meu Perfil e Histórico com a IA</a>
        <a href="admin.html">👉 Ir para o Painel Admin (Criar Posts)</a>

    <div>
        <h2>Últimos Conteúdos</h2>
        <div id="feed-posts">
            <p>Carregando posts...</p>
        </div>
    </div>

    <script type="module" src="app.js"></script>

</html>
