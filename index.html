<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DEZ-ENVOLVE | Portal</title>
    <link rel="stylesheet" href="style.css?v=14">
    <script src="pwa.js" defer></script>
</head>
<body>

    <nav class="navbar">
        <span class="brand">DEZ-ENVOLVE</span>
    </nav>

    <div class="main-wrapper">
        <div id="login-section" style="text-align: center; padding: 20px 0;">
            <h1 style="font-family: 'Merriweather', serif; font-size: 2rem;">Desenvolvimento Sistemático</h1>
            <p style="margin: 20px 0; color: #666;">A escola ensina o que pensar. Nós ensinamos como fazer.</p>
            <button id="btn-login" class="btn-primary">Acessar Conteúdo</button>
        </div>

        <div id="user-section" class="hidden">
            <div id="category-filters" class="scroll-menu">
                <button class="filter-btn active" data-categoria="todas">Capa</button>
                <button class="filter-btn" data-categoria="c1">Organização</button>
                <button class="filter-btn" data-categoria="c2">Tempo</button>
                <button class="filter-btn" data-categoria="c3">Estudo</button>
                <button class="filter-btn" data-categoria="c4">Digital/IA</button>
                <button class="filter-btn" data-categoria="c5">Finanças</button>
            </div>
            <div id="feed-posts" class="news-grid">
                <p style="padding: 15px;">Carregando...</p>
            </div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
