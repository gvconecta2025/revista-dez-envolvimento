<style>
    .scroll-menu {
        display: flex;
        overflow-x: auto;
        gap: 10px;
        padding: 10px 0;
        margin-bottom: 20px;
        scrollbar-width: none; /* Firefox */
        -ms-overflow-style: none;  /* IE and Edge */
    }
    .scroll-menu::-webkit-scrollbar {
        display: none; /* Safari e Chrome */
    }
    .filter-btn {
        background-color: #f1f5f9;
        border: 1px solid #cbd5e1;
        border-radius: 20px;
        padding: 8px 16px;
        cursor: pointer;
        font-weight: 500;
        font-size: 0.9rem;
        white-space: nowrap;
        transition: all 0.3s ease;
    }
    /* O primeiro botão começa com o visual ativo */
    .filter-btn.active {
        background-color: #0f172a;
        color: white;
    }
</style>

<div id="category-filters" class="scroll-menu">
    <button class="filter-btn active" data-categoria="todas" style="background-color: #0f172a; color: white;">Todas as Trilhas</button>
    <button class="filter-btn" data-categoria="c1">Organização Pessoal</button>
    <button class="filter-btn" data-categoria="c2">Gestão de Tempo</button>
    <button class="filter-btn" data-categoria="c3">Método de Estudo</button>
    <button class="filter-btn" data-categoria="c4">Inteligência Digital e IA</button>
    <button class="filter-btn" data-categoria="c5">Educação Financeira</button>
    <button class="filter-btn" data-categoria="c6">Tomada de Decisão</button>
    <button class="filter-btn" data-categoria="c7">Leitura Crítica</button>
    <button class="filter-btn" data-categoria="c8">Disciplina e Constância</button>
    <button class="filter-btn" data-categoria="c9">Autoconhecimento</button>
    <button class="filter-btn" data-categoria="c10">Comunicação</button>
    <button class="filter-btn" data-categoria="e1">Profissão e Empreendedorismo</button>
</div>
