<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin - DEZ-ENVOLVE</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script src="pwa.js" defer></script>
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="brand-container">
            <img src="icons/icon-192.png" alt="Logo" class="nav-icon">
            <span class="brand" style="font-size: 1rem;">← Voltar</span>
        </a>
    </nav>

    <div class="main-wrapper">
        <div class="container">
            <h2>Criar Novo Post</h2>
            <p id="status-msg" class="hidden">Post publicado com sucesso!</p>
            
            <form id="form-post">
                <label for="titulo" style="font-weight: 600;">Título do Post</label>
                <input type="text" id="titulo" required placeholder="Digite um título chamativo">

                <label for="categoria" style="font-weight: 600; display: block; margin-top: 15px; margin-bottom: 5px;">Trilha de Capacitação (Pais/Família)</label>
                <select id="categoria" required style="width: 100%; padding: 10px; margin-bottom: 20px; border: 1px solid #ccc; border-radius: 5px; font-size: 16px; background-color: #fff;">
                    <option value="" disabled selected>Selecione a área de conhecimento...</option>
                    <optgroup label="Construção e Recuperação">
                        <option value="c1">C1 - Organização Pessoal</option>
                        <option value="c2">C2 - Gestão de Tempo</option>
                        <option value="c3">C3 - Método de Estudo</option>
                        <option value="c4">C4 - Inteligência Digital e IA</option>
                        <option value="c5">C5 - Educação Financeira</option>
                        <option value="c6">C6 - Tomada de Decisão</option>
                        <option value="c7">C7 - Leitura e Interpretação Crítica</option>
                        <option value="c8">C8 - Disciplina e Constância</option>
                        <option value="c9">C9 - Autoconhecimento e Direção</option>
                        <option value="c10">C10 - Comunicação e Expressão</option>
                    </optgroup>
                    <optgroup label="Eixos Práticos">
                        <option value="e1">Eixo - Profissão e Empreendedorismo</option>
                    </optgroup>
                </select>
                <label style="font-weight: 600; display: block; margin-bottom: 5px;">Conteúdo (Texto, formatações e imagens)</label>
                <div id="editor-container"></div>

                <button type="submit" class="btn-primary" style="margin-top: 20px;">Publicar Artigo</button>
            </form>
        </div>
    </div>

    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <script type="module" src="admin.js"></script>
</body>
</html>
