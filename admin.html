<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin - DEZ-ENVOLVE</title>
    <link rel="stylesheet" href="style.css?v=8">
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
</head>
<body>
    <div class="main-wrapper">
        <div class="container">
            <div style="display: flex; gap: 5px; margin-bottom: 20px;">
                <button id="btn-show-form" class="btn-primary">✍️ Post</button>
                <button id="btn-show-manage" class="btn-secondary">📂 Artigos</button>
                <button id="btn-show-dash" class="btn-secondary">📊 Dash</button>
                <button id="btn-show-notify" class="btn-secondary" style="background:#10b981; color:white;">📢 Push</button>
            </div>

            <div id="admin-form-section">
                <h2 id="form-title">Criar Novo Post</h2>
                <p id="status-msg" class="hidden">Sucesso!</p>
                <form id="form-post">
                    <input type="hidden" id="edit-post-id" value="">
                    <input type="text" id="titulo" required placeholder="Título">
                    <select id="categoria" required>
                        <option value="" disabled selected>Categoria...</option>
                        <option value="c1">Organização</option><option value="c3">Método</option>
                    </select>
                    <div id="editor-container" style="height: 200px; background: white;"></div>
                    <button type="submit" id="btn-submit-post" class="btn-primary" style="margin-top:20px;">Publicar</button>
                    <button type="button" id="btn-cancel-edit" class="btn-secondary hidden">Cancelar</button>
                </form>
            </div>

            <div id="admin-manage-section" class="hidden"><div id="manage-list"></div></div>
            <div id="admin-dash-section" class="hidden"><div id="dash-list"></div></div>
            
            <div id="admin-notify-section" class="hidden">
                <h2>Notificação Push</h2>
                <input type="text" id="push-title" placeholder="Título">
                <textarea id="push-body" placeholder="Mensagem"></textarea>
                <button id="btn-send-push" class="btn-primary" style="background:#10b981;">Enviar Push</button>
                <p id="push-status-msg"></p>
            </div>
        </div>
    </div>
    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <script type="module" src="admin.js"></script>
</body>
</html>
